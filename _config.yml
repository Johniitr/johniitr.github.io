title: "John Mohd Wani – Research Portfolio"
description: "Personal academic website built with Jekyll and Minimal Mistakes."
url: "https://johniitr.github.io"
baseurl: ""
remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "dark"
plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-paginate
  - jekyll-feed
  - jekyll-seo-tag

author:
  name   : "John Mohd Wani"
  avatar : "/assets/images/WaniJohn.jpg"
